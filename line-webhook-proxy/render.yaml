services:
  - type: web
    name: line-webhook-proxy
    runtime: node
    rootDir: line-webhook-proxy
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_DEFAULT_USER_ID
        sync: false
      - key: GAS_BASE_URL
        sync: false
